spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

jwt:
  access-secret: "test-access-secret-key-256-bits-minimum-for-hs256-algorithm"
  refresh-secret: "test-refresh-secret-key-256-bits-minimum-for-hs256-algorithm"
  access-expiration: 900000
  refresh-expiration: 604800000
