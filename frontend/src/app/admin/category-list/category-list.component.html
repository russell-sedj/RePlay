<div>
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">Categories</h1>
    <button (click)="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">+ Nouvelle categorie</button>
  </div>

  <div *ngIf="loading" class="text-center py-8 text-gray-500">Chargement...</div>

  <div *ngIf="!loading" class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left bg-gray-50 border-b">
          <th class="p-3">Nom</th>
          <th class="p-3">Slug</th>
          <th class="p-3">Description</th>
          <th class="p-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of categories" class="border-b hover:bg-gray-50">
          <td class="p-3 font-medium">{{ c.name }}</td>
          <td class="p-3 text-gray-500">{{ c.slug }}</td>
          <td class="p-3 text-gray-500 max-w-xs truncate">{{ c.description }}</td>
          <td class="p-3 space-x-2">
            <button (click)="openModal(c)" class="text-blue-600 hover:underline text-xs">Modifier</button>
            <button (click)="delete(c.id)" class="text-red-600 hover:underline text-xs">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" (click)="showModal=false">
    <div class="bg-white rounded-lg p-6 w-full max-w-md" (click)="$event.stopPropagation()">
      <h2 class="text-xl font-bold mb-4">{{ editId ? 'Modifier' : 'Nouvelle' }} categorie</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-medium mb-1">Nom</label>
          <input [(ngModel)]="form.name" class="w-full border rounded px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Slug</label>
          <input [(ngModel)]="form.slug" class="w-full border rounded px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Description</label>
          <textarea [(ngModel)]="form.description" class="w-full border rounded px-3 py-2 text-sm" rows="3"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Image URL</label>
          <input [(ngModel)]="form.imageUrl" class="w-full border rounded px-3 py-2 text-sm">
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <button (click)="showModal=false" class="px-4 py-2 border rounded hover:bg-gray-100 text-sm">Annuler</button>
        <button (click)="save()" [disabled]="saving" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 text-sm">
          {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
        </button>
      </div>
      <p *ngIf="error" class="text-red-500 text-sm mt-2">{{ error }}</p>
    </div>
  </div>
</div>
