<div>
  <h1 class="text-2xl font-bold mb-4">Utilisateurs</h1>

  <div *ngIf="loading" class="text-center py-8 text-gray-500">Chargement...</div>

  <div *ngIf="!loading" class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left bg-gray-50 border-b">
          <th class="p-3">ID</th>
          <th class="p-3">Email</th>
          <th class="p-3">Prenom</th>
          <th class="p-3">Nom</th>
          <th class="p-3">Role</th>
          <th class="p-3">Inscrit le</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users" class="border-b hover:bg-gray-50">
          <td class="p-3 font-medium">{{ u.id }}</td>
          <td class="p-3">{{ u.email }}</td>
          <td class="p-3">{{ u.firstName }}</td>
          <td class="p-3">{{ u.lastName }}</td>
          <td class="p-3">
            <span class="px-2 py-1 rounded text-xs font-medium"
                  [class.bg-purple-100]="u.role==='ADMIN'" [class.text-purple-800]="u.role==='ADMIN'"
                  [class.bg-gray-100]="u.role==='USER'" [class.text-gray-800]="u.role==='USER'">
              {{ u.role }}
            </span>
          </td>
          <td class="p-3 text-gray-500">{{ u.createdAt | date:'dd/MM/yyyy' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="flex justify-center gap-2 mt-4" *ngIf="totalPages > 1">
    <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 0" class="px-3 py-1.5 border rounded hover:bg-gray-100 disabled:opacity-50 text-sm">Precedent</button>
    <span class="text-sm text-gray-600 py-1.5">Page {{ currentPage + 1 }} / {{ totalPages }}</span>
    <button (click)="changePage(currentPage + 1)" [disabled]="currentPage >= totalPages - 1" class="px-3 py-1.5 border rounded hover:bg-gray-100 disabled:opacity-50 text-sm">Suivant</button>
  </div>
</div>
