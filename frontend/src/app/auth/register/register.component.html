<h1 class="text-2xl font-bold mb-6 text-center">Inscription</h1>

<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="max-w-md mx-auto space-y-4">
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Prenom</label>
      <input type="text" formControlName="firstName"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched" class="text-red-500 text-sm mt-1">Requis</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
      <input type="text" formControlName="lastName"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched" class="text-red-500 text-sm mt-1">Requis</p>
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
    <input type="email" formControlName="email"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <p *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-red-500 text-sm mt-1">Email valide requis</p>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
    <input type="password" formControlName="password"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <p *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="text-red-500 text-sm mt-1">Minimum 8 caracteres</p>
  </div>

  <p *ngIf="errorMessage" class="text-red-500 text-sm text-center">{{ errorMessage }}</p>
  <p *ngIf="successMessage" class="text-green-500 text-sm text-center">{{ successMessage }}</p>

  <button type="submit" [disabled]="registerForm.invalid || loading"
          class="w-full bg-blue-600 text-white rounded-lg px-4 py-2 hover:bg-blue-700 disabled:opacity-50">
    {{ loading ? 'Inscription...' : 'S\'inscrire' }}
  </button>

  <p class="text-center text-sm text-gray-600">
    Deja un compte ? <a routerLink="/login" class="text-blue-600 hover:underline">Se connecter</a>
  </p>
</form>
