<h1 class="text-2xl font-bold mb-6 text-center">Connexion</h1>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="max-w-md mx-auto space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
    <input type="email" formControlName="email"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
           [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
    <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-red-500 text-sm mt-1">
      Email valide requis
    </p>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
    <input type="password" formControlName="password"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
           [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
    <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-500 text-sm mt-1">
      Mot de passe requis
    </p>
  </div>

  <p *ngIf="errorMessage" class="text-red-500 text-sm text-center">{{ errorMessage }}</p>

  <button type="submit" [disabled]="loginForm.invalid || loading"
          class="w-full bg-blue-600 text-white rounded-lg px-4 py-2 hover:bg-blue-700 disabled:opacity-50">
    {{ loading ? 'Connexion...' : 'Se connecter' }}
  </button>

  <p class="text-center text-sm text-gray-600">
    Pas de compte ? <a routerLink="/register" class="text-blue-600 hover:underline">S'inscrire</a>
  </p>
</form>
