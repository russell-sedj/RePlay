<div class="max-w-4xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Mon Panier</h1>

  <div *ngIf="loading" class="text-center py-8 text-gray-500">Chargement...</div>

  <div *ngIf="!loading && cart && cart.isEmpty" class="text-center py-12">
    <p class="text-gray-500 text-lg mb-4">Votre panier est vide</p>
    <a routerLink="/products" class="text-blue-600 hover:underline">Decouvrir le catalogue</a>
  </div>

  <div *ngIf="!loading && cart && !cart.isEmpty" class="space-y-4">
    <div *ngFor="let item of cart.items"
         class="bg-white rounded-lg shadow p-4 flex items-center gap-4">
      <img [src]="item.imageUrl" [alt]="item.productName" class="w-20 h-20 object-cover rounded">

      <div class="flex-1">
        <a [routerLink]="['/products', item.productSlug]" class="font-semibold hover:text-blue-600">
          {{ item.productName }}
        </a>
        <p class="text-sm text-gray-500">{{ item.unitPrice | number:'1.2-2' }} EUR / unite</p>
      </div>

      <div class="flex items-center gap-2">
        <button (click)="decreaseQuantity(item)"
                class="w-8 h-8 border rounded hover:bg-gray-100">-</button>
        <input type="number" [value]="item.quantity" (change)="onQuantityChange(item, $any($event.target).value)"
               class="w-16 text-center border rounded px-2 py-1" min="1">
        <button (click)="increaseQuantity(item)"
                class="w-8 h-8 border rounded hover:bg-gray-100">+</button>
      </div>

      <p class="font-semibold w-24 text-right">{{ item.subtotal | number:'1.2-2' }} EUR</p>

      <button (click)="removeItem(item)"
              class="text-red-500 hover:text-red-700">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>

    <div class="bg-white rounded-lg shadow p-4 flex justify-between items-center">
      <div>
        <button (click)="clearCart()" class="text-red-600 hover:text-red-800 text-sm">
          Vider le panier
        </button>
      </div>
      <div class="text-right">
        <p class="text-lg font-bold">Total: {{ cart.total | number:'1.2-2' }} EUR</p>
        <a routerLink="/checkout"
           class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 mt-2 transition">
          Commander
        </a>
      </div>
    </div>
  </div>
</div>
