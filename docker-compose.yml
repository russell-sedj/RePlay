services:
  postgres:
    image: postgres:16-alpine
    container_name: replay-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: replay
      POSTGRES_USER: replay
      POSTGRES_PASSWORD: replay
    volumes:
      - replay-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: replay-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@replay.fr
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  replay-pgdata:
